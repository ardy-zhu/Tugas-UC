<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="mystyle.css" />
    <title>Portfolio - My Daily Life</title>
  </head>

  <body>
    <div class="container">
      <header class="portfolio-title">
        <h1>My Hobbies</h1>
      </header>

      <main>
        <div class="slideshow-container">
          <!-- Radio buttons (hidden) -->
          <input type="radio" name="slide" id="slide1" checked />
          <input type="radio" name="slide" id="slide2" />
          <input type="radio" name="slide" id="slide3" />

          <!-- Slides -->
          <div class="slides">
            <div class="slide s1">
              <img
                src="https://media.uiargonaut.com/wp-content/uploads/2021/10/pexels-cottonbro-4009402-1024x683.jpg"
              />
            </div>
            <div class="slide s2">
              <img
                src="https://img.freepik.com/free-photo/strong-man-training-gym_1303-23478.jpg?semt=ais_hybrid&w=740&q=80"
              />
            </div>
            <div class="slide s3">
              <img
                src="https://media-cldnry.s-nbcnews.com/image/upload/t_fit-1500w,f_auto,q_auto:best/rockcms/2023-09/six-hours-of-sleep-zz-230927-5701a4.jpg"
              />
            </div>
          </div>

          <!-- Navigation dots -->
          <div class="navigation">
            <label for="slide1" class="dot"></label>
            <label for="slide2" class="dot"></label>
            <label for="slide3" class="dot"></label>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Ardyanto Hendrajaya. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
